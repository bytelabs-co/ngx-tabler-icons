name: "Library: Release to NPM"

on:
  workflow_run:
    workflows: ["Library: Build and Release", "Library: Daily Check, Build and Release new @bytelabs/ngx-tabler-icons"]
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  check-artifact:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if artifact exists
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });
            const exists = artifacts.data.artifacts.some(a => a.name === 'ngx-tabler-icons');
            core.setOutput('exists', exists);

  release-library:
    needs: check-artifact
    if: needs.check-artifact.outputs.exists == 'true'
    runs-on: ubuntu-latest

    steps:

      - name: Download library artifact
        uses: actions/download-artifact@v4
        with:
          name: ngx-tabler-icons
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: NPM CI
        run: npm ci

      - name: Publish to NPM
        run: npm publish bytelabs-ngx-tabler-icons-*.tgz --access public
