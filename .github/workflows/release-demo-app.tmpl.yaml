name: "Demo App: Release to Pages"

on:
  workflow_run:
    workflows: ["Library: Build and Release", "Library: Daily Check, Build and Release new @bytelabs/ngx-tabler-icons"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false  

jobs:
  check-artifact:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if artifact exists
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });
            const exists = artifacts.data.artifacts.some(a => a.name === 'ngx-tabler-icons-demo');
            core.setOutput('exists', exists);

  release-demo-app:
    needs: check-artifact
    if: needs.check-artifact.outputs.exists == 'true'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      - name: Download library artifact
        uses: actions/download-artifact@v4
        with:
          name: ngx-tabler-icons-demo
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
          
